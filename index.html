<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GeoGuessr Simple</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

#top{
    padding:10px;
    background:#000;
}

#map{
    height:90vh;
}
</style>
</head>

<body>

<div id="top">
    🌍 GeoGuessr Simple |
    Score: <span id="score">0</span>
</div>

<div id="map"></div>

<script>

let score = 0;

const LOCATIONS = [
    {name:"Eiffel Tower", lat:48.8584, lon:2.2945},
    {name:"Statue of Liberty", lat:40.6892, lon:-74.0445},
    {name:"Pyramids", lat:29.9792, lon:31.1342},
    {name:"Tokyo", lat:35.6762, lon:139.6503},
    {name:"Sydney Opera House", lat:-33.8568, lon:151.2153}
];

let target;

function randomLocation(){
    target = LOCATIONS[
        Math.floor(Math.random()*LOCATIONS.length)
    ];

    console.log(target.name);
}

const map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

function distance(lat1, lon1, lat2, lon2){
    const R = 6371;

    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2)*Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)*Math.sin(dLon/2);

    return R * 2 *
        Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

map.on('click', e => {

    let d = distance(
        e.latlng.lat,
        e.latlng.lng,
        target.lat,
        target.lon
    );

    let pts = Math.max(
        0,
        Math.round(10000 - d*10)
    );

    score += pts;

    document.getElementById("score").innerText = score;

    L.marker([target.lat, target.lon])
        .addTo(map);

    alert(
        "Target: " + target.name +
        "\\nDistance: " + Math.round(d) + " km" +
        "\\nPoints: +" + pts
    );

    randomLocation();
});

randomLocation();

</script>

</body>
</html>
